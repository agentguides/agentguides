  <rect x="0" y="0" width="10" height="630" fill="{{ACCENT}}"/>
  <g transform="translate(90,86)">
    <g transform="translate(0,-40) scale(0.9)">
      <rect x="1" y="1" width="62" height="62" rx="14" fill="{{SURFACE}}" stroke="{{BORDER}}" stroke-width="2"/>
      <path d="M17 49 L33 15 L46 41" fill="none" stroke="{{ACCENT}}" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
      <g fill="{{ACCENT}}">
        <circle cx="17" cy="49" r="5.5"/>
        <circle cx="33" cy="15" r="5.5"/>
        <circle cx="46" cy="41" r="5.5"/>
      </g>
    </g>
    <text x="78" y="10" font-family="{{SANS}}" font-size="30" font-weight="700" fill="{{TEXT}}">{{WORDMARK}}</text>
  </g>
  <text x="90" y="300" font-family="{{SANS}}" font-size="66" font-weight="700" fill="{{TEXT}}">{{TITLE_TSPANS}}</text>
  <text x="90" y="{{SUBTITLE_Y}}" font-family="{{SANS}}" font-size="30" fill="{{MUTED}}">{{SUBTITLE}}</text>
  <text x="90" y="566" font-family="{{MONO}}" font-size="26" fill="{{MUTED}}">{{DOMAIN}}</text>
</svg>
