intro: >-
  Agent Guides extend the Agent Skills format to multi-step procedures — runbooks,
  incident response, migrations, onboarding. Every Guide is a valid Skill, so any
  Skills-compatible client can discover it; Guide-aware clients additionally execute
  the workflow step by step and record an append-only event log of each walk.

