title: Agent Guides
description: An open, Skills-compatible specification for multi-step agent workflows — walked by agents and humans, refined by recorded walks.
url: https://agentguides.io

# Brand assets (generated by ../brand/render.mjs -> `just brand`).
# `logo` is consumed by both just-the-docs (sidebar) and jekyll-seo-tag (JSON-LD).
logo: /assets/logo.png
twitter:
  username: agentguides
  card: summary_large_image

# Top-right header links — rendered as icons by _includes/components/aux_nav.html.
# Socials added once handles are claimed (infra-ff7); keys map to icons (GitHub/X/Discord).
aux_links:
  GitHub: https://github.com/agentguides/agentguides
aux_links_new_tab: true

# jekyll-seo-tag reads the page-level `image`, not a site-level one — set the default
# OG image as a front-matter default. Pages may override with their own `image:`.
defaults:
  - scope:
      path: ""
    values:
      image: /assets/og/default.png

remote_theme: just-the-docs/just-the-docs@v0.12.0

color_scheme: agentguides
search_enabled: true
heading_anchors: true

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-remote-theme

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
